<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Multi-Agente</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #667eea;
            color: white;
            padding: 16px 20px;
            border-radius: 12px 12px 0 0;
        }

        .header h1 { font-size: 20px; margin-bottom: 10px; text-align: center; }

        .header-config {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .header-config label { font-size: 12px; opacity: 0.9; white-space: nowrap; }

        .header-config input {
            flex: 1;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            outline: none;
        }

        .header-config input::placeholder { color: rgba(255,255,255,0.6); }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f8fc;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 8px 8px 0 8px;
        }

        .message.bot .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px 8px 8px 0;
        }

        /* Markdown styles dentro de mensajes */
        .message-content h1, .message-content h2, .message-content h3 {
            margin: 8px 0 4px;
            font-size: 15px;
        }
        .message-content p { margin-bottom: 6px; }
        .message-content ul, .message-content ol { padding-left: 18px; margin-bottom: 6px; }
        .message-content li { margin-bottom: 2px; }
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
            font-size: 13px;
        }
        .message-content th, .message-content td {
            border: 1px solid #ddd;
            padding: 6px 10px;
            text-align: left;
        }
        .message-content th { background: #f0f0f0; font-weight: 600; }
        .message-content strong { font-weight: 600; }
        .message-content code {
            background: #f0f0f0;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 12px;
        }

        .agent-badge {
            font-size: 11px;
            margin-top: 6px;
            opacity: 0.6;
            font-weight: 500;
        }

        .input-section {
            padding: 12px 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
        }

        .input-section input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-section input:focus { border-color: #667eea; }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px 8px 8px 0;
            width: fit-content;
        }

        .typing span {
            width: 8px; height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chatbot Multi-Agente</h1>
            <div class="header-config">
                <label>Franchise ID:</label>
                <input type="text" id="franchiseInput" placeholder="Ingresa tu Franchise ID..." />
            </div>
        </div>

        <div class="chat-messages" id="messages"></div>

        <div class="input-section">
            <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." autocomplete="off" />
            <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        const SESSION_ID = 'session_' + Date.now();
        const API_URL = 'http://localhost:8000/chat/';

        const messageInput   = document.getElementById('messageInput');
        const franchiseInput = document.getElementById('franchiseInput');
        const messagesContainer = document.getElementById('messages');
        const sendBtn = document.getElementById('sendBtn');

        // Recuperar franchise_id guardado
        franchiseInput.value = localStorage.getItem('franchise_id') || '';
        franchiseInput.addEventListener('change', () => {
            localStorage.setItem('franchise_id', franchiseInput.value.trim());
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            const franchiseId = franchiseInput.value.trim();

            if (!message) return;
            if (!franchiseId) {
                alert('Ingresa tu Franchise ID antes de enviar un mensaje.');
                franchiseInput.focus();
                return;
            }

            messageInput.value = '';
            sendBtn.disabled = true;
            addMessage(message, 'user');

            const typingEl = addTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: SESSION_ID,
                        franchise_id: franchiseId,
                        user_id: 'ui_user'
                    })
                });

                typingEl.remove();

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'API Error');
                }

                const data = await response.json();
                addMessage(data.response, 'bot', data.agent_type);

            } catch (error) {
                typingEl.remove();
                addMessage('Error: ' + error.message, 'bot');
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, role, agent = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (role === 'bot') {
                contentDiv.innerHTML = marked.parse(text);
            } else {
                contentDiv.textContent = text;
            }

            if (agent) {
                const badge = document.createElement('div');
                badge.className = 'agent-badge';
                badge.textContent = `Agente: ${agent}`;
                contentDiv.appendChild(badge);
            }

            msgDiv.appendChild(contentDiv);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addTyping() {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return msgDiv;
        }

        window.addEventListener('load', () => {
            addMessage('¡Hola! Soy tu asistente de ventas. Ingresa tu Franchise ID arriba y pregúntame lo que necesites.', 'bot');
        });
    </script>
</body>
</html>
